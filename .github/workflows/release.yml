name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag to publish, for example v0.1.0. Leave empty to use the current short commit id.'
        required: false
        type: string

permissions:
  contents: write

env:
  APP_NAME: aether-dock
  NODE_VERSION: '22'
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            wails-platform: windows/amd64
            artifact-name: aether-dock-windows-amd64
          - name: macOS
            os: macos-latest
            wails-platform: darwin/universal
            artifact-name: aether-dock-darwin-universal

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        shell: bash
        run: npm ci

      - name: Resolve Wails version
        id: wails
        shell: bash
        run: echo "version=$(go list -m -f '{{.Version}}' github.com/wailsapp/wails/v2)" >> "$GITHUB_OUTPUT"

      - name: Install Wails CLI
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ steps.wails.outputs.version }}

      - name: Test backend
        shell: bash
        run: go test ./...

      - name: Build Wails app
        shell: bash
        run: wails build -clean -trimpath -platform ${{ matrix.wails-platform }}

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path "build/bin/${{ env.APP_NAME }}.exe" -DestinationPath "dist/${{ matrix.artifact-name }}.zip" -Force

      - name: Package macOS artifact
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "build/bin/${APP_NAME}.app" "dist/${{ matrix.artifact-name }}.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG_NAME="${INPUT_VERSION}"
            if [ -z "$TAG_NAME" ]; then
              TAG_NAME="$(git rev-parse --short HEAD)"
            fi
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-assets/*/*.zip --clobber
          else
            gh release create "$TAG_NAME" release-assets/*/*.zip --target "$GITHUB_SHA" --title "$TAG_NAME" --generate-notes
          fi
